<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطاقات QR — جميع الفروع</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#E8ECF2;padding:24px;display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{width:260px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.10);page-break-inside:avoid;break-inside:avoid;}
.card-header{background:#1B3A6B;padding:18px 16px 14px;text-align:center;}
.eyebrow{font-size:10px;color:#7FAED6;letter-spacing:0.06em;margin-bottom:6px;}
.card-header h2{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.4;}
.card-header p{font-size:10px;color:#A8C4E0;}
.stars{display:flex;gap:2px;justify-content:center;margin-top:8px;}
.star{color:#EF9F27;font-size:13px;}
.qr-section{padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.qr-wrap{width:150px;height:150px;border:1.5px solid #DDE3EC;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#fff;padding:6px;}
.qr-wrap img{width:100%;height:100%;}
.scan-label{text-align:center;font-size:11px;color:#6B7A8D;line-height:1.6;}
.scan-label strong{display:block;font-size:12px;color:#1A2332;font-weight:600;margin-bottom:2px;}
.divider{width:100%;height:1px;background:#DDE3EC;}
.steps{padding:10px 16px 14px;display:flex;flex-direction:column;gap:7px;}
.step-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#6B7A8D;}
.step-num{min-width:20px;height:20px;border-radius:50%;background:#E8F1FB;color:#2E6DB4;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.card-footer{background:#F5F7FA;border-top:1px solid #DDE3EC;padding:10px 16px;text-align:center;}
.branch-name{font-size:12px;font-weight:700;color:#1B3A6B;margin-bottom:2px;}
.footer-note{font-size:9px;color:#8A97A8;line-height:1.5;}
.print-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 28px;background:#1B3A6B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(27,58,107,0.3);z-index:100;}
@media print{body{background:#fff;padding:8px;gap:12px;} .card{box-shadow:none;border:1px solid #DDE3EC;} .print-btn{display:none;} @page{margin:0.8cm;}}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://anasaburadif.github.io/Survey';

const branches = [
  { name: 'An Nafil — النفل',          key: 'An Nafil' },
  { name: 'Takhassousi — التخصصي',     key: 'Takhassousi' },
  { name: 'Malqa — الملقا',            key: 'Malqa' },
  { name: 'Sulimaniyah — السليمانية',  key: 'Sulimaniyah' },
  { name: 'Ar Rawdah — الروضة',        key: 'Ar Rawdah' },
  { name: 'Al Basateen — البساتين',    key: 'Al Basateen' },
  { name: 'Al Marwah — المروة',        key: 'Al Marwah' },
  { name: "Al Fayha'a — الفيحاء",     key: "Al Fayha'a" },
  { name: 'Al Ruhaili — الرحيلي',     key: 'Al Ruhaili' },
  { name: 'Obhur — أبحر',             key: 'Obhur' },
  { name: 'Attas — عطاس',             key: 'Attas' },
  { name: 'Al Awali — العوالي',        key: 'Al Awali' },
  { name: 'Dharat Laban — ظهرة لبن',  key: 'Dharat Laban' },
];

function createCard(branch, index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="eyebrow">Customer Satisfaction Survey</div>
      <h2>شاركنا رأيك</h2>
      <p>رأيك يساعدنا نقدم لك الأفضل</p>
      <div class="stars"><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span></div>
    </div>
    <div class="qr-section">
      <div class="qr-wrap"><img id="qr-${index}" src="" alt="QR"></div>
      <div class="scan-label"><strong>امسح الكود للمشاركة</strong>Scan to share your feedback</div>
    </div>
    <div class="divider"></div>
    <div class="steps">
      <div class="step-item"><div class="step-num">١</div><span>افتح الكاميرا وامسح الكود</span></div>
      <div class="step-item"><div class="step-num">٢</div><span>أجب على ٤ أسئلة سريعة</span></div>
      <div class="step-item"><div class="step-num">٣</div><span>أقل من دقيقة — شكراً!</span></div>
    </div>
    <div class="card-footer">
      <div class="branch-name">${branch.name}</div>
      <div class="footer-note">استبيانك سري ويُستخدم لتحسين الخدمة فقط</div>
    </div>
  `;
  return card;
}

function makeQR(id, url) {
  const img = document.getElementById(id);
  const div = document.createElement('div');
  div.style.cssText = 'position:absolute;left:-9999px;';
  document.body.appendChild(div);
  new QRCode(div, {
    text: url, width: 200, height: 200,
    colorDark: '#1B3A6B', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  setTimeout(() => {
    const canvas = div.querySelector('canvas');
    if(canvas) img.src = canvas.toDataURL();
    document.body.removeChild(div);
  }, 400);
}

window.onload = () => {
  branches.forEach((branch, i) => {
    document.body.appendChild(createCard(branch, i));
  });
  setTimeout(() => {
    branches.forEach((branch, i) => {
      const url = `${BASE_URL}?branch=${encodeURIComponent(branch.key)}`;
      makeQR(`qr-${i}`, url);
    });
  }, 200);
};
</script>

<button class="print-btn" onclick="window.print()">🖨️ طباعة كل البطاقات (13 فرع)</button>
</body>
</html>
